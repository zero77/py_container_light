name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Generate SBOM (Syft)
        uses: anchore/syft-action@v0.16.0
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          output: "sbom.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Scan image with Grype (HIGH+CRITICAL)
        uses: anchore/grype-action@v0.9.0
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          fail-on-severity: high

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:latest

      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator@v2.0.0
        with:
          artifact_path: sbom.json
