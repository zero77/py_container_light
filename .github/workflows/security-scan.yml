name: Daily Security Scanning

on:
  schedule:
    - cron: "0 1 * * *"   # daily at 01:00 UTC
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      IMAGE: ghcr.io/zero77/py_container_light:latest

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ---------------------------
      # REPOSITORY SCANNING
      # ---------------------------
      
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: false

      - name: Trivy Dockerfile misconfiguration scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-config-results.sarif
          exit-code: 0

      # ---------------------------
      # IMAGE SCANNING
      # ---------------------------

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull $IMAGE

#https://github.com/DNSZLSK/muad-dib
      - name: MUAD'DIB source scan
        uses: DNSZLSK/muad-dib@v1
        continue-on-error: true
        with:
          path: '.'
          fail-on: high
          sarif: muaddib-results.sarif
     
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL

      # ---------------------------
      # SARIF UPLOAD
      # ---------------------------
      
      - name: Upload SARIF to GitHub Security (repo scan)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/trivy-results.sarif
          category: trivy-fs
      
      - name: Upload SARIF to GitHub Security (Dockerfile config)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/trivy-config-results.sarif
          category: trivy-config
      
      - name: Upload SARIF to GitHub Security (image scan)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/trivy-image-results.sarif
          wait-for-processing: true
          category: trivy-image
      
      - name: Upload SARIF to GitHub Security (MUAD'DIB)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/muaddib-results.sarif
          category: muaddib-source
