name: Daily Security Scanning

on:
  schedule:
    - cron: "0 1 * * *"   # daily at 01:00 UTC
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ---------------------------
      # REPOSITORY SCANNING
      # ---------------------------

      - name: Trivy filesystem scan (selected paths)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: false
          path: |
            requirements.txt
            Dockerfile
            src/
            app/
            config/

      # ---------------------------
      # IMAGE SCANNING
      # ---------------------------

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/$(basename ${{ github.repository }}):latest
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          docker pull $IMAGE

      - name: MUAD'DIB image scan
        uses: DNSZLSK/muad-dib@master
        continue-on-error: true
        with:
          args: scan ${{ env.IMAGE }}
      
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          args: --severity CRITICAL,HIGH

      # ---------------------------
      # SARIF UPLOAD
      # ---------------------------

      - name: Upload SARIF to GitHub Security (repo scan)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF to GitHub Security (image scan)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
