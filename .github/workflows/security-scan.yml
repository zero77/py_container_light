name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # TRIVY (fixed version)
      # -----------------------------
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: table
          exit-code: 0
          ignore-unfixed: true

      # -----------------------------
      # BANDIT (SARIF output fixed)
      # -----------------------------
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (non-blocking)
        run: |
          bandit -r . -f sarif -o bandit.sarif || true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

      # -----------------------------
      # PIP-AUDIT (non-blocking)
      # -----------------------------
      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (non-blocking)
        run: |
          pip-audit --progress-spinner=off || true
